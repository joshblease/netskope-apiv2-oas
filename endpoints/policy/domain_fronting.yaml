          description: user who created
          example: automation@sample.com
          type: string
        create_time:
          description: UTC time conform ISO 8601
          example: "2022-12-14T06:08:04.123Z"
          type: string
        description:
          example: my domain fronting description
          type: string
        id:
          description: domain fronting ID
          type: string
        lists:
          description: list ID
          example:
            - "123"
            - "11"
          items:
            type: string
          type: array
        modify_by:
          description: user who modified lastly
          example: superman@sample.com
          type: string
        modify_time:
          description: UTC time conform ISO 8601
          example: "2022-12-30T01:05:00.222Z"
          type: string
        name:
          example: my-exception
          type: string
        status:
          description: status of domain fronting
          enum:
            - applied
            - pending
          type: string
      type: object
    domainfronting-post:
      x-speakeasy-entity: DomainFronting
      properties:
        description:
          example: my domain fronting description
          type: string
        lists:
          description: list ID
          example:
            - "199"
            - "1978"
          items:
            type: string
          type: array
        name:
          example: my-exception
          type: string
      type: object
    domainfrontings:
      properties:
        elements:
          items:
            $ref: "#/components/schemas/domainfronting"
          type: array
      type: object
    error-response-500:
      properties:
        datetime:
          description: the time error occured
          example: "2022-08-31T11:14:23.187Z"
          type: string
        err_code:
          description: unique error code for troubleshooting
          example: "701"
          type: string
        message:
          description: human readable error message
          example: database query error / internal error
          type: string
        trace_id:
          description: trace id for troubleshooting
          example: bsbg4m9ru4bb3qstvkl0
          type: string
      type: object
    successful-delete-response:
      properties:
        status:
          description: successful operation
          example: success
          type: string
      type: object
